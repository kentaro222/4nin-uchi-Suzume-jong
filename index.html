<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4人打ち すずめ雀</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b9e2b">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    
<style>
    /* 追加：フォントの定義 */
    @font-face {
        font-family: 'DotGothic16';
        src: url('DotGothic16-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

        html {
            background-color: #3b9e2b;
        }

        body { 
            font-family: 'DotGothic16', sans-serif; 
            background-color: #3b9e2b; /* ファミコンの麻雀マット風の緑 */
            color: white; 
            margin: 0 auto; /* 中央寄せ */
            padding: 5px 10px; 
            text-align: center; 
            touch-action: manipulation; /* ダブルタップズーム防止 */
            
            /* 画面全体を縦に並べるフレックスコンテナにする */
            display: flex;
            flex-direction: column;
            height: 100dvh; /* スマホのブラウザバーを除いた正確な画面高さ */
            box-sizing: border-box;
            
            /* 横長画面への対応: 最大幅を制限 */
            max-width: 600px;
        }
        
        /* 画面上部の情報バー */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
            margin: 0 auto 5px auto;
            font-size: 16px;
            border-bottom: 1px solid white;
            padding-bottom: 5px;
            width: 100%;
            flex-shrink: 0; /* 縮まないようにする */
        }

        #turn-indicator {
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
        }

        .dora-container {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        #dora-indicator {
            transform: scale(0.9);
            transform-origin: center;
            height: 37px;
            margin-left: -2px;
            margin-right: -2px;
        }

        /* 縦並びのレイアウト */
        #game-board { 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            width: 100%; 
            margin: 0 auto; 
            flex-shrink: 0; /* 盤面は縮めない */
        }
        
        /* 各プレイヤーのエリア（横長の行） */
        .player-area { 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start;
            border-bottom: 1px dashed rgba(255,255,255,0.4); 
            padding-bottom: 8px;
        }
        
        /* 左側の名前/スコア表示エリア */
        .player-info {
            width: 80px; 
            font-size: 14px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-top: 2px;
            flex-shrink: 0;
        }

        .player-name {
            display: flex;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
        }

        .dealer-mark {
            background-color: #f44336;
            color: white;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 2px;
            display: none;
        }

        .player-score {
            font-size: 18px;
            color: #fff;
        }

        /* 右側の盤面（上が捨て牌、下が手牌） */
        .play-area {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 4px;
        }

        .discards { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 1px; 
            width: 100%; 
            min-height: 41px;
            align-content: flex-start; 
            justify-content: flex-start;
        }

        .hand { 
            display: flex; 
            gap: 1px; 
            min-height: 41px;
            justify-content: flex-start;
            align-items: center;
        }
        
        /* 牌のスタイリング */
        .tile { 
            width: 34px; 
            height: 41px; 
            background-image: url('tiles.png');
            background-size: 2100% 100%;
            background-repeat: no-repeat;
            background-position-x: calc(var(--tile-index, 0) * 5%);
            background-position-y: center;
            image-rendering: pixelated;
            
            cursor: default; 
            user-select: none;
        }
        
        /* プレイヤー(自分)の手牌 */
        #player-0 .hand {
            min-height: 41px;
            gap: 2px;
        }
        #player-0 .hand .tile {
            cursor: pointer; 
            transition: transform 0.1s;
        }
        
        #player-0 .hand .tile:active { 
            transform: translateY(-2px); 
        }

        /* コントロールパネル */
        #controls { 
            margin-top: 10px; 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
            min-height: 50px;
        }
        button { 
            font-family: 'DotGothic16', sans-serif;
            padding: 10px 16px;
            font-size: 18px;
            cursor: pointer; 
            margin: 0; 
            border-radius: 2px; 
            border: 1px solid white;
            box-shadow: 2px 2px 0px black;
            touch-action: manipulation;
        }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px black; }
        
        #btn-tsumo { background-color: #ff9800; color: white; display: none; }
        #btn-ron { background-color: #f44336; color: white; display: none; }
        #btn-next { background-color: #2196f3; color: white; display: none; }
        #btn-next-round { background-color: #9c27b0; color: white; display: none; }
        
                /* ログウィンドウ：最低4行分（約120px）を確保 */
        #log { 
            width: calc(100% - 10px);
            margin: 10px auto; 
            padding: 10px; 
            background: black; 
            border: 2px solid white;
            border-radius: 3px;
            
            flex-grow: 1; 
            min-height: 120px; /* ここを追加：4〜5行分を常に表示 */
            
            overflow-y: auto; 
            text-align: left; 
            font-size: 16px;
            line-height: 1.5;
            box-sizing: border-box;
        }

        /* フッターエリア：ボタンとアイコンを横並びに */
        #footer-controls {
            padding-bottom: 15px; /* 下に少し余裕を持たせる */
            padding-top: 5px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* ボタンとアイコンの間隔 */
        }

        /* 案内アイコン（まるにはてな） */
        #btn-guide {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 2px solid #ffd700;
            border-radius: 50%;
            color: #ffd700;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        #btn-guide:active {
            opacity: 0.5;
        }


        .log-tsumo { color: #ffeb3b; font-weight: bold; }
        .log-ron { color: #ff5722; font-weight: bold; }
        .log-score { color: #8bc34a; font-weight: bold; }

        /* フッターエリア */
        #footer-controls {
            padding-bottom: 5px;
            padding-top: 5px;
            flex-shrink: 0;
        }
        #btn-reset { 
            background-color: #607d8b; 
            color: white; 
            font-size: 14px;
            padding: 8px 16px;
            box-shadow: 1px 1px 0px black;
        }

        #link-guide {
            display: inline-block;
            color: #ffd700; /* ドラと同じ金色 */
            text-decoration: none;
            font-size: 16px;
            margin-top: 12px;
            padding: 5px 10px;
            border-bottom: 1px solid #ffd700;
            transition: opacity 0.2s;
        }
        #link-guide:active {
            opacity: 0.6;
            color: white;
            border-bottom-color: white;
        }

        /* 確認用モーダル */
        #reset-modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.7); 
            justify-content: center; 
            align-items: center;
        }
        .modal-content {
            background-color: black;
            border: 2px solid white;
            padding: 20px;
            text-align: center;
            border-radius: 3px;
            font-size: 18px;
            width: 80%;
            max-width: 400px;
        }
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div>第<span id="round-num">1</span>周 <span id="game-num">1</span>局</div>
        <div id="turn-indicator">開始中...</div>
        <div class="dora-container">
            <span>ドラ:</span>
            <div id="dora-indicator"></div>
            <span style="margin-left: 2px;">残:<span id="deck-count">44</span></span>
        </div>
    </div>

    <div id="game-board">
        <div id="player-1" class="player-area">
            <div class="player-info">
                <div class="player-name">CPU1<span class="dealer-mark" id="dealer-1">親</span></div>
                <div class="player-score" id="score-1">40点</div>
            </div>
            <div class="play-area">
                <div class="discards" id="discard-1"></div>
                <div class="hand" id="hand-1"></div>
            </div>
        </div>

        <div id="player-2" class="player-area">
            <div class="player-info">
                <div class="player-name">CPU2<span class="dealer-mark" id="dealer-2">親</span></div>
                <div class="player-score" id="score-2">40点</div>
            </div>
            <div class="play-area">
                <div class="discards" id="discard-2"></div>
                <div class="hand" id="hand-2"></div>
            </div>
        </div>

        <div id="player-3" class="player-area">
            <div class="player-info">
                <div class="player-name">CPU3<span class="dealer-mark" id="dealer-3">親</span></div>
                <div class="player-score" id="score-3">40点</div>
            </div>
            <div class="play-area">
                <div class="discards" id="discard-3"></div>
                <div class="hand" id="hand-3"></div>
            </div>
        </div>

        <div id="player-0" class="player-area" style="border-bottom: none;">
            <div class="player-info">
                <div class="player-name" style="color: #ffd700;">あなた<span class="dealer-mark" id="dealer-0">親</span></div>
                <div class="player-score" id="score-0">40点</div>
            </div>
            <div class="play-area">
                <div class="discards" id="discard-0"></div>
                <div class="hand" id="hand-0"></div>
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-tsumo" onclick="declareTsumo(0)">ツモ！</button>
        <button id="btn-ron" onclick="declareRon(0)">ロン！</button>
        <button id="btn-next" onclick="nextTurn()">見逃す</button>
        <button id="btn-next-round" onclick="startRound()">次の局へ</button>
    </div>

        <div id="log"></div>

        <div id="footer-controls">
        <button id="btn-reset" onclick="openResetModal()">消去(リセット)</button>
        
        <a href="guide.html" target="_blank" id="btn-guide" title="遊び方ガイド">?</a>
    </div>

    </div>

    <div id="reset-modal">
        <div class="modal-content">
            <p>データを削除して、<br>最初からやり直しますか？</p>
            <div class="modal-buttons">
                <button onclick="executeReset()" style="background-color: #f44336; padding: 10px 20px;">はい</button>
                <button onclick="closeResetModal()" style="background-color: #9e9e9e; padding: 10px 20px;">いいえ</button>
            </div>
        </div>
    </div>

    <script>
        // Service Workerの登録 (PWA対応)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        // 牌の定義
        const TILE_TYPES = { SOUZU: 'souzu', HATSU: 'hatsu', CHUN: 'chun' };
        let deck = [];
        let players = [];
        let currentTurn = 0;
        let lastDiscard = null;
        let gameOver = false;
        
        // 局の管理用変数
        let roundNum = 1; // 1~4周
        let startingDealer = -1; // 起家（最初の親）
        let currentDealer = -1; // 現在の親
        let doraTile = null; // ドラ表示牌

        // ローカルストレージキー
        const SAVE_KEY = 'suzumeGameState';

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.insertAdjacentHTML('afterbegin', `<div>＊ ${msg}</div>`);
            logDiv.scrollTop = 0;
        }

        // --- セーブ＆ロード処理 ---
        function saveGameState() {
            const state = {
                deck: deck,
                players: players,
                currentTurn: currentTurn,
                lastDiscard: lastDiscard,
                gameOver: gameOver,
                roundNum: roundNum,
                startingDealer: startingDealer,
                currentDealer: currentDealer,
                doraTile: doraTile
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(state));
        }

        function loadGameState() {
            const saved = localStorage.getItem(SAVE_KEY);
            if (!saved) return false;
            try {
                const state = JSON.parse(saved);
                deck = state.deck;
                players = state.players;
                currentTurn = state.currentTurn;
                lastDiscard = state.lastDiscard;
                gameOver = state.gameOver;
                roundNum = state.roundNum;
                startingDealer = state.startingDealer;
                currentDealer = state.currentDealer;
                doraTile = state.doraTile;
                return true;
            } catch (e) {
                console.error("セーブデータの読み込みに失敗しました", e);
                return false;
            }
        }

        // モーダル制御
        function openResetModal() {
            document.getElementById('reset-modal').style.display = 'flex';
        }

        function closeResetModal() {
            document.getElementById('reset-modal').style.display = 'none';
        }

        function executeReset() {
            closeResetModal();
            localStorage.removeItem(SAVE_KEY);
            document.getElementById('log').innerHTML = '';
            startGame();
        }

        function initGame() {
            if (loadGameState()) {
                log("前回の続きから再開しました。");
                resumeGame();
            } else {
                startGame();
            }
        }

        function resumeGame() {
            render(); // 画面を復元
            
            if (gameOver) {
                if (roundNum <= 4) {
                    document.getElementById('btn-next-round').style.display = 'inline-block';
                } else {
                    document.getElementById('turn-indicator').innerText = "ゲーム終了";
                }
                return;
            }

            let activePlayer = players[currentTurn];
            
            // ロン待機状態の復元 (手牌が5枚で lastDiscard が存在する状態)
            if (lastDiscard && activePlayer.hand.length === 5) {
                let canRon = false;
                let p0Res = checkWin([...players[0].hand, lastDiscard.tile], 0 === currentDealer, doraTile);
                if (p0Res.points >= 5 && !isFuriten(0, lastDiscard.tile)) {
                     canRon = true;
                     document.getElementById('btn-ron').style.display = 'inline-block';
                     document.getElementById('btn-ron').dataset.points = p0Res.points;
                     document.getElementById('btn-ron').dataset.yaku = p0Res.yaku.join(', ');
                     document.getElementById('btn-next').style.display = 'inline-block';
                }
                
                if (canRon) {
                    return; // プレイヤーの入力待ち
                } else {
                    startTurn(); // 次のプレイヤーへ
                    return;
                }
            }

            // ツモ直後の復元 (手牌が6枚の状態)
            if (activePlayer.hand.length === 6) {
                if (currentTurn === 0) {
                    let res = checkWin(activePlayer.hand, currentTurn === currentDealer, doraTile);
                    if (res.points >= 5) {
                        document.getElementById('btn-tsumo').style.display = 'inline-block';
                    }
                } else {
                    setTimeout(() => {
                        let discardIndex = getCPUDiscardIndex(currentTurn);
                        discardTile(currentTurn, discardIndex);
                    }, 800);
                }
            } else {
                startTurn();
            }
        }

        // 手牌をソートする関数
        function sortHand(hand) {
            const typeOrder = { 'souzu': 1, 'hatsu': 2, 'chun': 3 };
            hand.sort((a, b) => {
                if(a.type !== b.type) return typeOrder[a.type] - typeOrder[b.type];
                if(a.val !== b.val) return a.val - b.val;
                return (a.red === b.red) ? 0 : (a.red ? -1 : 1);
            });
        }

        // デッキ生成
        function initDeck() {
            deck = [];
            for (let i = 1; i <= 9; i++) {
                deck.push({ type: TILE_TYPES.SOUZU, val: i, red: true });
                for(let j=0; j<3; j++) deck.push({ type: TILE_TYPES.SOUZU, val: i, red: false });
            }
            for(let j=0; j<4; j++) deck.push({ type: TILE_TYPES.HATSU, val: 0, red: false });
            for(let j=0; j<4; j++) deck.push({ type: TILE_TYPES.CHUN, val: 0, red: false });
            
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function getTileHTML(tile, hidden = false) {
            let index = 0;
            if (!hidden && tile) {
                if (tile.type === TILE_TYPES.SOUZU) {
                    index = 1 + (tile.val - 1) * 2 + (tile.red ? 1 : 0);
                } else if (tile.type === TILE_TYPES.HATSU) {
                    index = 19;
                } else if (tile.type === TILE_TYPES.CHUN) {
                    index = 20;
                }
            }
            return `<div class="tile" style="--tile-index: ${index};"></div>`;
        }

        function render() {
            document.getElementById('round-num').innerText = roundNum;
            
            // 局数の計算 (起家からの差分で1〜4局を計算)
            let gameNum = (currentDealer - startingDealer + 4) % 4 + 1;
            document.getElementById('game-num').innerText = gameNum;

            document.getElementById('deck-count').innerText = deck.length.toString().padStart(2, '0');
            
            document.getElementById('dora-indicator').innerHTML = doraTile ? getTileHTML(doraTile, false) : '';

            for (let i = 0; i < 4; i++) {
                const handDiv = document.getElementById(`hand-${i}`);
                const discardDiv = document.getElementById(`discard-${i}`);
                
                document.getElementById(`score-${i}`).innerText = `${players[i].score}点`;
                document.getElementById(`dealer-${i}`).style.display = (i === currentDealer) ? 'inline-block' : 'none';

                handDiv.innerHTML = '';
                players[i].hand.forEach((tile, index) => {
                    const tileEl = document.createElement('div');
                    tileEl.innerHTML = getTileHTML(tile, players[i].isCPU && !gameOver);
                    let tileNode = tileEl.firstElementChild;
                    
                    if (!players[i].isCPU && currentTurn === i && !gameOver) {
                        tileNode.onclick = () => discardTile(0, index);
                    }
                    
                    // ツモ牌（手牌が6枚の時の6枚目）はスマホ向けに少し隙間を狭める
                    if (players[i].hand.length === 6 && index === 5) {
                        tileNode.style.marginLeft = '5px';
                    }
                    
                    handDiv.appendChild(tileNode);
                });

                // 捨て牌の描画
                let discardHTML = '';
                players[i].discards.forEach(t => {
                   discardHTML += getTileHTML(t);
                });
                discardDiv.innerHTML = discardHTML;
            }
            // 描画が完了したら状態を保存
            saveGameState();
        }

        // --- 役と点数計算アルゴリズム ---
        function checkWin(tiles6, isDealer, doraTileObj) {
            const splits = [
                [[0,1,2], [3,4,5]], [[0,1,3], [2,4,5]], [[0,1,4], [2,3,5]], [[0,1,5], [2,3,4]],
                [[0,2,3], [1,4,5]], [[0,2,4], [1,3,5]], [[0,2,5], [1,3,4]],
                [[0,3,4], [1,2,5]], [[0,3,5], [1,2,4]], [[0,4,5], [1,2,3]]
            ];

            let bestResult = { points: 0, yaku: [] };
            let isComplete = false;
            let validSplits = [];
            
            for (let split of splits) {
                let g1 = [tiles6[split[0][0]], tiles6[split[0][1]], tiles6[split[0][2]]];
                let g2 = [tiles6[split[1][0]], tiles6[split[1][1]], tiles6[split[1][2]]];
                let p1 = evaluateMeld(g1);
                let p2 = evaluateMeld(g2);
                if (p1 > 0 && p2 > 0) {
                    isComplete = true;
                    validSplits.push({g1, g2, p1, p2});
                }
            }

            if (!isComplete) return bestResult;

            let isAllGreen = tiles6.every(t => !t.red && t.type !== TILE_TYPES.CHUN && 
                             (t.type === TILE_TYPES.HATSU || (t.type === TILE_TYPES.SOUZU && [2,3,4,6,8].includes(t.val))));
            let isChinyao = tiles6.every(t => t.type === TILE_TYPES.HATSU || t.type === TILE_TYPES.CHUN || 
                            (t.type === TILE_TYPES.SOUZU && [1,9].includes(t.val)));
            let isSuperRed = tiles6.every(t => t.red || t.type === TILE_TYPES.CHUN);

            // 特殊役の判定（特殊役は元から5点以上あるので、親ボーナスを無条件に足せる）
            if (isSuperRed) {
                let pts = 20; let yaku = ["スーパーレッド(20)"];
                if (isDealer) { pts += 2; yaku.push("親ボーナス(2)"); }
                return { points: pts, yaku: yaku };
            }
            if (isChinyao) {
                let pts = 15; let yaku = ["チンヤオ(15)"];
                if (isDealer) { pts += 2; yaku.push("親ボーナス(2)"); }
                return { points: pts, yaku: yaku };
            }
            if (isAllGreen) {
                let pts = 10; let yaku = ["オールグリーン(10)"];
                if (isDealer) { pts += 2; yaku.push("親ボーナス(2)"); }
                return { points: pts, yaku: yaku };
            }

            for (let vs of validSplits) {
                let basePoints = 0; // 基本点（5点の条件に使う点数）
                let yakuList = [];

                basePoints += vs.p1 + vs.p2;
                yakuList.push(`基本点(${vs.p1 + vs.p2})`);

                let redCount = tiles6.filter(t => t.red || t.type === TILE_TYPES.CHUN).length;
                if (redCount > 0) {
                    basePoints += redCount;
                    yakuList.push(`赤牌x${redCount}`);
                }

                if (doraTileObj) {
                    let doraCount = tiles6.filter(t => t.type === doraTileObj.type && t.val === doraTileObj.val).length;
                    if (doraCount > 0) {
                        basePoints += doraCount;
                        yakuList.push(`ドラx${doraCount}`);
                    }
                }

                let hasYaochu = tiles6.some(t => t.type === TILE_TYPES.HATSU || t.type === TILE_TYPES.CHUN || (t.type === TILE_TYPES.SOUZU && [1,9].includes(t.val)));
                if (!hasYaochu) {
                    basePoints += 1;
                    yakuList.push("タンヤオ(1)");
                }

                let hasYaochuG1 = vs.g1.some(t => t.type === TILE_TYPES.HATSU || t.type === TILE_TYPES.CHUN || (t.type === TILE_TYPES.SOUZU && [1,9].includes(t.val)));
                let hasYaochuG2 = vs.g2.some(t => t.type === TILE_TYPES.HATSU || t.type === TILE_TYPES.CHUN || (t.type === TILE_TYPES.SOUZU && [1,9].includes(t.val)));
                if (hasYaochuG1 && hasYaochuG2) {
                    basePoints += 2;
                    yakuList.push("チャンタ(2)");
                }

                // 基本点だけで5点以上あるか判定する
                if (basePoints >= 5) {
                    let finalPoints = basePoints;
                    
                    // 5点条件を満たしている場合のみ、親ボーナスを加算
                    if (isDealer) {
                        finalPoints += 2;
                        yakuList.push("親ボーナス(2)");
                    }

                    if (finalPoints > bestResult.points) {
                        bestResult = { points: finalPoints, yaku: yakuList };
                    }
                }
            }

            return bestResult; // 5点未満の場合は初期値の {points: 0, yaku: []} が返る
        }

        function evaluateMeld(g) {
            if (g[0].type === g[1].type && g[1].type === g[2].type && g[0].val === g[1].val && g[1].val === g[2].val) return 2;
            if (g[0].type === TILE_TYPES.SOUZU && g[1].type === TILE_TYPES.SOUZU && g[2].type === TILE_TYPES.SOUZU) {
                let vals = g.map(t => t.val).sort((a,b)=>a-b);
                if (vals[0] + 1 === vals[1] && vals[1] + 1 === vals[2]) return 1;
            }
            return 0;
        }

        function isFuriten(playerIndex, winningTile) {
            return players[playerIndex].discards.some(t => {
                if (winningTile.type === TILE_TYPES.SOUZU) {
                    return t.type === TILE_TYPES.SOUZU && t.val === winningTile.val;
                } else {
                    return t.type === winningTile.type;
                }
            });
        }

        // --- CPU思考ロジック ---
        function getCPUDiscardIndex(playerIndex) {
            let hand6 = players[playerIndex].hand;
            let isDealer = (playerIndex === currentDealer);
            
            let tenpaiScores = [];

            // 各牌を捨てた場合の「有効牌（引けばあがれる牌）」の数を数える
            for (let i = 0; i < hand6.length; i++) {
                let testHand5 = [...hand6];
                testHand5.splice(i, 1);
                
                let effectiveTilesCount = 0;
                let pointsSum = 0;

                // 考えうる全ての牌(11種+赤で10+10+1+1=22通り)をテスト
                for (let type of [TILE_TYPES.SOUZU, TILE_TYPES.HATSU, TILE_TYPES.CHUN]) {
                    let vals = type === TILE_TYPES.SOUZU ? [1,2,3,4,5,6,7,8,9] : [0];
                    for (let val of vals) {
                        for (let isRed of [true, false]) {
                            if (type !== TILE_TYPES.SOUZU && isRed) continue;

                            let testHand6 = [...testHand5, {type: type, val: val, red: isRed}];
                            let res = checkWin(testHand6, isDealer, doraTile);
                            if (res.points >= 5) {
                                effectiveTilesCount++;
                                pointsSum += res.points;
                            }
                        }
                    }
                }
                tenpaiScores.push({ index: i, count: effectiveTilesCount, sum: pointsSum });
            }

            // 有効牌が多い順（同じなら点数期待値が高い順）にソート
            tenpaiScores.sort((a, b) => {
                if (b.count !== a.count) return b.count - a.count;
                return b.sum - a.sum;
            });

            // もし1手でアガれる有効牌が存在するなら、それに向かう牌を捨てる
            if (tenpaiScores[0].count > 0) {
                return tenpaiScores[0].index;
            }

            // アガリが見えない場合は「孤立牌（くっつきにくい不要牌）」から切る
            let kuttsukiScores = [];
            for (let i = 0; i < hand6.length; i++) {
                let tile = hand6[i];
                let score = 0;
                
                // 対子・暗刻の元
                score += hand6.filter(t => t !== tile && t.type === tile.type && t.val === tile.val).length * 2;
                
                // 順子の元（索子のみ）
                if (tile.type === TILE_TYPES.SOUZU) {
                    score += hand6.filter(t => t !== tile && t.type === TILE_TYPES.SOUZU && Math.abs(t.val - tile.val) === 1).length * 1.5; // 両面・辺張
                    score += hand6.filter(t => t !== tile && t.type === TILE_TYPES.SOUZU && Math.abs(t.val - tile.val) === 2).length * 1.0; // 嵌張
                }
                
                // ドラ・赤ドラの価値
                if (tile.red) score += 2;
                if (tile.type === TILE_TYPES.CHUN) score += 2; 
                if (doraTile && tile.type === doraTile.type && tile.val === doraTile.val) score += 1.5;

                // 中張牌の価値
                if (tile.type === TILE_TYPES.SOUZU && tile.val >= 3 && tile.val <= 7) score += 0.5;

                kuttsukiScores.push({ index: i, score: score });
            }

            // スコアが一番「低い」牌を捨てる
            kuttsukiScores.sort((a, b) => a.score - b.score);
            return kuttsukiScores[0].index;
        }

        // --- ゲームフロー管理 ---
        function startGame() {
            players = [
                { name: "あなた", hand: [], discards: [], isCPU: false, score: 40 },
                { name: "CPU1", hand: [], discards: [], isCPU: true, score: 40 },
                { name: "CPU2", hand: [], discards: [], isCPU: true, score: 40 },
                { name: "CPU3", hand: [], discards: [], isCPU: true, score: 40 }
            ];
            roundNum = 1;
            startingDealer = Math.floor(Math.random() * 4); 
            currentDealer = startingDealer;
            lastDiscard = null;
            
            log(`ゲーム開始！ 最初の親は ${players[currentDealer].name} です。`);
            startRound();
        }

        function startRound() {
            initDeck();
            players.forEach(p => { p.hand = []; p.discards = []; });
            
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 4; j++) {
                    players[j].hand.push(deck.pop());
                }
            }
            // 配牌をソート
            players.forEach(p => sortHand(p.hand));
            
            doraTile = deck.pop();
            lastDiscard = null;
            
            // 局数の計算
            let gameNum = (currentDealer - startingDealer + 4) % 4 + 1;
            let doraName = doraTile.type === TILE_TYPES.SOUZU ? `索子${doraTile.val}` : (doraTile.type === TILE_TYPES.HATSU ? '發' : '中');
            log(`【第${roundNum}周 ${gameNum}局】 ドラ表示は [${doraName}] です。`);

            currentTurn = currentDealer;
            gameOver = false;
            
            document.getElementById('btn-next-round').style.display = 'none';
            startTurn();
        }

        function startTurn() {
            if (deck.length === 0) {
                log("山牌がなくなりました。流局です。");
                endRound();
                return;
            }

            document.getElementById('turn-indicator').innerText = `${players[currentTurn].name}の番`;
            document.getElementById('btn-tsumo').style.display = 'none';
            document.getElementById('btn-ron').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';

            const drawnTile = deck.pop();
            // ツモ牌はソートせず配列の最後（右端）に追加
            players[currentTurn].hand.push(drawnTile);
            
            let res = checkWin(players[currentTurn].hand, currentTurn === currentDealer, doraTile);
            if (res.points >= 5) {
                if (currentTurn === 0) {
                    document.getElementById('btn-tsumo').style.display = 'inline-block';
                } else {
                    log(`<span class="log-tsumo">${players[currentTurn].name} がツモあがり！ ${res.points}点 [${res.yaku.join(', ')}]</span>`);
                    processScoreTsumo(currentTurn, res.points);
                    endRound();
                    return;
                }
            }

            render();

            if (currentTurn !== 0 && !gameOver) {
                setTimeout(() => {
                    let discardIndex = getCPUDiscardIndex(currentTurn);
                    discardTile(currentTurn, discardIndex);
                }, 800);
            }
        }

        // ロン時に牌を移動させる関数
        function takeRonTile(winnerIdx, loserIdx) {
            if (!lastDiscard) return;
            // 振り込んだ人の捨て牌から削除
            players[loserIdx].discards.pop();
            // あがった人の手牌に追加 (ソートはせずに一番右に置く)
            players[winnerIdx].hand.push(lastDiscard.tile);
            render();
        }

        function discardTile(playerIndex, tileIndex) {
            if (playerIndex !== currentTurn || gameOver) return;

            const discarded = players[playerIndex].hand.splice(tileIndex, 1)[0];
            sortHand(players[playerIndex].hand); // 捨てた後に手牌をソート
            
            players[playerIndex].discards.push(discarded);
            lastDiscard = { tile: discarded, from: playerIndex };
            
            let ronNameStr = '';
            if(discarded.type === TILE_TYPES.SOUZU) ronNameStr = `索子${discarded.val}${discarded.red ? '(赤)' : ''}`;
            else ronNameStr = discarded.type === TILE_TYPES.HATSU ? '發' : '中';
            log(`${players[playerIndex].name} が [${ronNameStr}] を捨てた。`);

            render();

            let canRon = false;
            for (let i = 0; i < 4; i++) {
                if (i === playerIndex) continue;
                let testHand = [...players[i].hand, discarded];
                let res = checkWin(testHand, i === currentDealer, doraTile);
                
                if (res.points >= 5) {
                    if (!isFuriten(i, discarded)) {
                        if (i === 0) {
                            canRon = true;
                            document.getElementById('btn-ron').style.display = 'inline-block';
                            document.getElementById('btn-ron').dataset.points = res.points;
                            document.getElementById('btn-ron').dataset.yaku = res.yaku.join(', ');
                        } else {
                            log(`<span class="log-ron">${players[i].name} がロン！ ${res.points}点 [${res.yaku.join(', ')}]</span>`);
                            // 牌の移動
                            takeRonTile(i, playerIndex);
                            processScoreRon(i, playerIndex, res.points);
                            endRound();
                            return;
                        }
                    }
                }
            }

            if (!gameOver) {
                if (canRon) {
                    document.getElementById('btn-next').style.display = 'inline-block'; 
                } else {
                    nextTurn();
                }
            }
        }

        function nextTurn() {
            document.getElementById('btn-ron').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
            currentTurn = (currentTurn + 1) % 4;
            startTurn();
        }

        function declareTsumo(playerIndex) {
            let res = checkWin(players[playerIndex].hand, playerIndex === currentDealer, doraTile);
            log(`<span class="log-tsumo">あなた がツモあがり！ ${res.points}点 [${res.yaku.join(', ')}]</span>`);
            processScoreTsumo(playerIndex, res.points);
            endRound();
        }

        function declareRon(playerIndex) {
            let btn = document.getElementById('btn-ron');
            let pts = parseInt(btn.dataset.points);
            let yakuStr = btn.dataset.yaku;
            log(`<span class="log-ron">あなた がロンあがり！ ${pts}点 [${yakuStr}]</span>`);
            
            // 牌の移動
            takeRonTile(playerIndex, lastDiscard.from);

            processScoreRon(playerIndex, lastDiscard.from, pts);
            endRound();
        }

        function payScore(fromIdx, toIdx, amount) {
            let actualPay = Math.min(players[fromIdx].score, amount);
            if (actualPay > 0) {
                players[fromIdx].score -= actualPay;
                players[toIdx].score += actualPay;
            }
        }

        function processScoreTsumo(winnerIdx, points) {
            let payAmount = Math.ceil(points / 3);
            log(`<span class="log-score">各プレイヤーは ${payAmount}点 支払います。</span>`);
            for(let i=0; i<4; i++) {
                if(i !== winnerIdx) {
                    payScore(i, winnerIdx, payAmount);
                }
            }
        }

        function processScoreRon(winnerIdx, loserIdx, points) {
            log(`<span class="log-score">${players[loserIdx].name} が ${points}点 支払います。</span>`);
            payScore(loserIdx, winnerIdx, points);
        }

        function endRound() {
            gameOver = true;
            
            document.getElementById('btn-tsumo').style.display = 'none';
            document.getElementById('btn-ron').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';

            render();
            
            currentDealer = (currentDealer + 1) % 4;
            
            if (currentDealer === startingDealer) {
                roundNum++;
            }

            if (roundNum > 4) {
                log(`<span class="log-tsumo">ゲーム終了！ 最終結果を発表します。</span>`);
                let sorted = [...players].sort((a,b) => b.score - a.score);
                log(`<span class="log-tsumo">1位: ${sorted[0].name} (${sorted[0].score}点)</span>`);
                document.getElementById('turn-indicator').innerText = "ゲーム終了";
            } else {
                document.getElementById('btn-next-round').style.display = 'inline-block';
            }
            saveGameState();
        }

        // 起動処理
        initGame();
    </script>
